<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NapoleonGram - Instagram Creator</title>
    
    <!-- Scripts & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        
        :root {
            /* Handmatige hex-kleuren om oklch fouten in html2canvas te voorkomen */
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--gray-50);
            color: #111827;
        }
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        
        /* PDF Export Styles */
        .pdf-export-container {
            background-color: #ffffff !important;
            color: #111827 !important;
        }
        .pdf-export-bg-gray-100 { background-color: #f3f4f6 !important; }
        .pdf-export-bg-gray-200 { background-color: #e5e7eb !important; }
        .pdf-export-text-gray-400 { color: #9ca3af !important; }
        .pdf-export-text-gray-500 { color: #6b7280 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // Helper voor Lucide Icons in React CDN omgeving
        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const INITIAL_POSTS = Array.from({ length: 4 }, (_, i) => ({
            id: `post-${i}`,
            profileName: 'Napoleon_Bonaparte',
            image: null,
            caption: 'Mijn nieuwste overwinning! 🇫🇷 #empire #napoleon',
            date: '13 APRIL 1804',
            likes: 1804,
            comments: [
                { id: 'c1', username: 'Josephine', text: 'Prachtig gedaan, mon chéri!' }
            ]
        }));

        function App() {
            const [posts, setPosts] = useState(INITIAL_POSTS);
            const [activeTab, setActiveTab] = useState(0);

            const updatePost = (index, updates) => {
                const newPosts = [...posts];
                newPosts[index] = { ...newPosts[index], ...updates };
                setPosts(newPosts);
            };

            const handleImageUpload = (index, e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        updatePost(index, { image: reader.result });
                    };
                    reader.readAsDataURL(file);
                }
            };

            const addComment = (index, username, text) => {
                if (!username || !text) return;
                const newComment = {
                    id: Math.random().toString(36).substr(2, 9),
                    username,
                    text
                };
                updatePost(index, { 
                    comments: [...posts[index].comments, newComment] 
                });
            };

            const removeComment = (postIndex, commentId) => {
                updatePost(postIndex, {
                    comments: posts[postIndex].comments.filter(c => c.id !== commentId)
                });
            };

            const resetPost = (index) => {
                updatePost(index, {
                    profileName: '',
                    image: null,
                    caption: '',
                    date: '',
                    likes: 0,
                    comments: []
                });
            };

            const downloadAllPDFs = async () => {
                const { jsPDF } = window.jspdf;
                let pdf = null;

                for (let i = 0; i < posts.length; i++) {
                    const element = document.getElementById(`export-post-${i}`);
                    if (!element) continue;

                    try {
                        const canvas = await html2canvas(element, {
                            scale: 2,
                            useCORS: true,
                            backgroundColor: '#ffffff',
                            imageTimeout: 0
                        });
                        
                        const imgData = canvas.toDataURL('image/png');
                        const imgWidth = canvas.width / 2;
                        const imgHeight = canvas.height / 2;
                        
                        if (!pdf) {
                            pdf = new jsPDF({
                                orientation: 'portrait',
                                unit: 'px',
                                format: [imgWidth, imgHeight]
                            });
                        } else {
                            pdf.addPage([imgWidth, imgHeight], 'portrait');
                        }

                        pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                    } catch (error) {
                        console.error(`Error generating PDF for post ${i + 1}:`, error);
                    }
                }
                
                if (pdf) {
                    pdf.save('alle-napoleon-posts.pdf');
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className="bg-white border-b border-gray-200 sticky top-0 z-50 px-4 py-3 shadow-sm">
                        <div className="max-w-5xl mx-auto flex items-center justify-between">
                            <h1 className="text-2xl font-bold italic font-serif">NapoleonGram</h1>
                            <div className="flex gap-2">
                                {posts.map((_, i) => (
                                    <button
                                        key={i}
                                        onClick={() => setActiveTab(i)}
                                        className={`px-4 py-1.5 rounded-full text-sm font-medium transition-all ${
                                            activeTab === i ? 'bg-black text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                                        }`}
                                    >Post {i + 1}</button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                        {/* Editor Section */}
                        <section className="space-y-6">
                            <div className="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm space-y-6">
                                <div className="flex items-center justify-between">
                                    <h2 className="text-lg font-semibold flex items-center gap-2">
                                        <Icon name="plus" /> Bewerk Post {activeTab + 1}
                                    </h2>
                                    <button 
                                        onClick={() => confirm('Weet je zeker dat je deze post wilt leegmaken?') && resetPost(activeTab)}
                                        className="text-xs font-bold text-red-500 uppercase hover:bg-red-50 px-2 py-1 rounded flex items-center gap-1"
                                    >
                                        <Icon name="trash-2" className="w-3 h-3" /> Wis Canvas
                                    </button>
                                </div>

                                <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 text-sm text-blue-800">
                                    <p className="font-bold mb-1">Instructies:</p>
                                    <ul className="list-disc list-inside space-y-1 opacity-90">
                                        <li>Vul de gegevens in aan de linkerkant.</li>
                                        <li>Bekijk het resultaat aan de rechterkant.</li>
                                        <li>Klik op de paarse knop om alle posts als PDF op te slaan.</li>
                                    </ul>
                                </div>

                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Profielnaam</label>
                                        <input type="text" value={posts[activeTab].profileName} onChange={(e) => updatePost(activeTab, { profileName: e.target.value })} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-black" />
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Foto Uploaden</label>
                                        <input type="file" accept="image/*" onChange={(e) => handleImageUpload(activeTab, e)} className="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-black file:text-white" />
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Bijschrift</label>
                                        <textarea value={posts[activeTab].caption} onChange={(e) => updatePost(activeTab, { caption: e.target.value })} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-black min-h-[80px]" />
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Datum</label>
                                            <input type="text" value={posts[activeTab].date} onChange={(e) => updatePost(activeTab, { date: e.target.value })} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Likes</label>
                                            <input type="number" value={posts[activeTab].likes} onChange={(e) => updatePost(activeTab, { likes: parseInt(e.target.value) || 0 })} className="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg outline-none" />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Opmerkingen</label>
                                        <div className="space-y-2 mb-3">
                                            {posts[activeTab].comments.map(c => (
                                                <div key={c.id} className="flex items-center justify-between bg-gray-50 p-2 rounded-lg border border-gray-100">
                                                    <div className="text-sm"><span className="font-bold mr-2">{c.username}</span>{c.text}</div>
                                                    <button onClick={() => removeComment(activeTab, c.id)} className="text-gray-400 hover:text-red-500"><Icon name="trash-2" className="w-4 h-4" /></button>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex gap-2">
                                            <input id="user-input" placeholder="Naam" className="w-1/3 px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm" />
                                            <input id="text-input" placeholder="Reactie..." className="flex-1 px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm" />
                                            <button onClick={() => {
                                                const u = document.getElementById('user-input');
                                                const t = document.getElementById('text-input');
                                                addComment(activeTab, u.value, t.value);
                                                u.value = ''; t.value = '';
                                            }} className="bg-black text-white px-4 py-2 rounded-lg text-sm">Voeg toe</button>
                                        </div>
                                    </div>
                                </div>

                                <button
                                    onClick={downloadAllPDFs}
                                    className="w-full bg-purple-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-purple-700 transition-all shadow-lg"
                                >
                                    <Icon name="download" /> Download alle post als PDF
                                </button>
                            </div>
                        </section>

                        {/* Preview Section */}
                        <section className="flex justify-center lg:sticky lg:top-24">
                            <div className="w-full max-w-[470px] bg-white border border-gray-200 rounded-lg overflow-hidden shadow-xl">
                                <div className="flex items-center justify-between p-3 border-b border-gray-50">
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center overflow-hidden"><Icon name="user" className="w-5 h-5 text-gray-400" /></div>
                                        <span className="font-semibold text-sm">{posts[activeTab].profileName}</span>
                                    </div>
                                    <Icon name="more-horizontal" className="text-gray-500" />
                                </div>
                                <div className="aspect-square bg-gray-100 flex items-center justify-center relative overflow-hidden">
                                    {posts[activeTab].image ? <img src={posts[activeTab].image} className="w-full h-full object-cover" /> : <div className="text-gray-400 flex flex-col items-center"><Icon name="camera" className="w-12 h-12 mb-2" /><p className="text-sm">Geen foto</p></div>}
                                </div>
                                <div className="p-3 space-y-3">
                                    <div className="flex items-center justify-between"><div className="flex items-center gap-4"><Icon name="heart" /><Icon name="message-circle" /><Icon name="send" /></div><Icon name="bookmark" /></div>
                                    <div className="font-semibold text-sm">{posts[activeTab].likes.toLocaleString()} vind-ik-leuks</div>
                                    <div className="text-sm"><span className="font-semibold mr-2">{posts[activeTab].profileName}</span>{posts[activeTab].caption}</div>
                                    {posts[activeTab].comments.map(c => (
                                        <div key={c.id} className="text-sm"><span className="font-semibold mr-2">{c.username}</span>{c.text}</div>
                                    ))}
                                    <div className="text-[10px] text-gray-400 uppercase tracking-wide">{posts[activeTab].date}</div>
                                </div>
                            </div>
                        </section>
                    </main>

                    {/* Hidden Export Container for PDF Generation */}
                    <div className="fixed -left-[9999px] top-0">
                        {posts.map((post, index) => (
                            <div key={`export-${index}`} id={`export-post-${index}`} className="w-[470px] bg-white border border-gray-200 rounded-lg overflow-hidden pdf-export-container">
                                <div className="flex items-center justify-between p-3 pdf-export-bg-gray-200">
                                    <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center overflow-hidden"><Icon name="user" className="w-5 h-5 text-gray-400" /></div>
                                        <span className="font-semibold text-sm">{post.profileName}</span>
                                    </div>
                                </div>
                                <div className="aspect-square bg-gray-100 flex items-center justify-center relative overflow-hidden pdf-export-bg-gray-100">
                                    {post.image ? <img src={post.image} className="w-full h-full object-cover" /> : <div className="text-gray-400 pdf-export-text-gray-400 flex flex-col items-center"><Icon name="camera" className="w-12 h-12 mb-2" /><p className="text-sm">Geen foto</p></div>}
                                </div>
                                <div className="p-3 space-y-3">
                                    <div className="flex items-center gap-4"><Icon name="heart" /><Icon name="message-circle" /><Icon name="send" /></div>
                                    <div className="font-semibold text-sm">{post.likes.toLocaleString()} vind-ik-leuks</div>
                                    <div className="text-sm"><span className="font-semibold mr-2">{post.profileName}</span>{post.caption}</div>
                                    {post.comments.map(c => (
                                        <div key={c.id} className="text-sm"><span className="font-semibold mr-2">{c.username}</span>{c.text}</div>
                                    ))}
                                    <div className="text-[10px] text-gray-400 uppercase tracking-wide pdf-export-text-gray-500">{post.date}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
